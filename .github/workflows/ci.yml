name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: testforge
          POSTGRES_PASSWORD: testforge
          POSTGRES_DB: testforge_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://testforge:testforge@localhost:5433/testforge_test
      EMBEDDING_PROVIDER: ollama
      CHAT_PROVIDER: ollama
      OLLAMA_BASE_URL: http://localhost:11434
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      OLLAMA_CHAT_MODEL: llama3.2:3b

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run test

  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://testforge:testforge@localhost:5433/testforge_test
      EMBEDDING_PROVIDER: ollama
      CHAT_PROVIDER: ollama
      OLLAMA_BASE_URL: http://localhost:11434
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      OLLAMA_CHAT_MODEL: llama3.2:3b
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
